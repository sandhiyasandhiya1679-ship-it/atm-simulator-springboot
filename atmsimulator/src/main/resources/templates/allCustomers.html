<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Customers - ATM Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center vh-100 align-items-start">
    <div class="card shadow mt-5 p-4" style="width: 50rem; text-align:center;">
        <h3 class="mb-4">All Customers</h3>

        <!-- Success or Error Message -->
        <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <!-- Customers Table -->
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Account Number</th>
                    <th>Name</th>
                    <th>Balance</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${customers}">
                    <td th:text="${c.accountNumber}"></td>
                    <td th:text="${c.name}"></td>
                    <td>₹<span th:text="${c.balance}"></span></td>
                    <td>
                        <a th:href="@{'/deleteCustomer/' + ${c.accountNumber}}" 
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this customer?');">
                           Delete
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Back Button -->
        <a th:href="@{/dashboard}" class="btn btn-primary w-100 mt-3">Back to Dashboard</a>
    </div>
</body>
</html>
