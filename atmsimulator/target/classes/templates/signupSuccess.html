<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Signup Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 28rem; text-align:center;">
        <h3 class="mb-3">Account Created Successfully!</h3>
        <p><strong>Account Number:</strong> <span th:text="${currentUser.accountNumber}"></span></p>
        <p><strong>Name:</strong> <span th:text="${currentUser.name}"></span></p>
        <p><strong>PIN:</strong> <span th:text="${currentUser.pin}"></span></p>
        <a th:href="@{/dashboard}" class="btn btn-primary mt-3 w-100">Go to Dashboard</a>
    </div>
</body>
</html>
