<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Change PIN - ATM Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <form th:action="@{/changePin}" method="post" class="card p-4 shadow" style="width: 25rem; text-align:center;">
        <h3 class="mb-3">Change PIN</h3>
        <div class="mb-3">
            <label>New PIN</label>
            <input type="password" class="form-control" name="newPin" required pattern="\d{4}" title="4-digit PIN">
        </div>
        <div class="text-success mb-2" th:text="${msg}"></div>
        <button type="submit" class="btn btn-secondary w-100">Change PIN</button>
        <a th:href="@{/dashboard}" class="btn btn-primary w-100 mt-2">Back to Dashboard</a>
    </form>
</body>
</html>
