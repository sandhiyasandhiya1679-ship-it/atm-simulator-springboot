<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign Up - ATM Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <form th:action="@{/signup}" method="post" class="card p-4 shadow" style="width: 25rem;">
        <h3 class="text-center mb-3">Sign Up</h3>
        <div class="mb-3">
            <label>Account Number</label>
            <input type="number" class="form-control" name="accountNumber" required>
        </div>
        <div class="mb-3">
            <label>Name</label>
            <input type="text" class="form-control" name="name" required>
        </div>
        <div class="mb-3">
            <label>PIN</label>
            <input type="password" class="form-control" name="pin" required pattern="\d{4}" title="4-digit PIN">
        </div>
        <div class="text-danger mb-2" th:text="${msg}"></div>
        <button type="submit" class="btn btn-success w-100">Sign Up</button>
        <p class="mt-3 text-center">Already have an account? <a href="/login">Login</a></p>
    </form>
</body>
</html>
