<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - ATM Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <form th:action="@{/login}" method="post" class="card p-4 shadow" style="width: 25rem;">
        <h3 class="text-center mb-3">Login</h3>
        <div class="mb-3">
            <label>Account Number</label>
            <input type="number" class="form-control" name="accountNumber" required>
        </div>
        <div class="mb-3">
            <label>PIN</label>
            <input type="password" class="form-control" name="pin" required>
        </div>
        <div class="text-danger mb-2" th:text="${error}"></div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
        <p class="mt-3 text-center">New user? <a href="/signup">Sign Up</a></p>
    </form>
</body>
</html>
