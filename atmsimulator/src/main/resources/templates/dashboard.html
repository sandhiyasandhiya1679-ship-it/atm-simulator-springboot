<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard - ATM Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 28rem; text-align:center;">
        <h3 class="mb-4">Dashboard</h3>
        <p><strong>Welcome:</strong> <span th:text="${currentUser.name}"></span></p>
        <a th:href="@{/deposit}" class="btn btn-success w-100 mb-2">Deposit</a>
        <a th:href="@{/withdraw}" class="btn btn-danger w-100 mb-2">Withdraw</a>
        <a th:href="@{/balance}" class="btn btn-info w-100 mb-2">Check Balance</a>
        <a th:href="@{/transfer}" class="btn btn-warning w-100 mb-2">Transfer Money</a>
        <a th:href="@{/changePin}" class="btn btn-secondary w-100 mb-2">Change PIN</a>
        <a th:href="@{/allCustomers}" class="btn btn-primary w-100 mb-2">All Customers</a>
        <a th:href="@{/logout}" class="btn btn-dark w-100 mt-2">Logout</a>
    </div>
</body>
</html>
