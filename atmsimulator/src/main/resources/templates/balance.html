<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Balance - ATM Simulator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 25rem; text-align:center;">
        <h3 class="mb-3">Current Balance</h3>
        <p class="fs-4">₹<span th:text="${balance}"></span></p>
        <a th:href="@{/dashboard}" class="btn btn-primary w-100 mt-2">Back to Dashboard</a>
    </div>
</body>
</html>
